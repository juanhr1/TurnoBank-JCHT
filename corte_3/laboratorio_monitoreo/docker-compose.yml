services:

  gateway:
    build: ./gateway
    ports:
      - "5000:5000"
    depends_on:
      - pedidos
      - inventario
      - pagos

  pedidos:
    build: ./pedidos
    ports:
      - "5001:5000"

  inventario:
    build: ./inventario
    ports:
      - "5002:5000"

  pagos:
    build: ./pagos
    ports:
      - "5003:5000"